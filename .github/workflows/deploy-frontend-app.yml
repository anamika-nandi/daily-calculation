name: Deploy Frontend App

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  deploy:
    name: Deploy Frontend App to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/daily-calculation
            git pull origin main
            cd frontend
            npm ci
            npm run build
            pm2 restart daily-frontend 2>/dev/null || pm2 start serve --name daily-frontend -- -s dist -l 5173
