name: Setup EC2 Server

on:
  workflow_dispatch:

jobs:
  setup:
    name: Setup EC2 Server Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "========== 1. System Update =========="
            sudo yum update -y

            echo "========== 2. Node.js v24 =========="
            if command -v node &> /dev/null; then
              echo "Node.js already installed: $(node -v)"
            else
              echo "Installing Node.js v24..."
              curl -fsSL https://rpm.nodesource.com/setup_24.x | sudo bash -
              sudo yum install -y nodejs
              echo "Installed: $(node -v)"
            fi

            echo "========== 3. PM2 (global) =========="
            if command -v pm2 &> /dev/null; then
              echo "PM2 already installed: $(pm2 -v)"
            else
              echo "Installing PM2..."
              sudo npm install -g pm2
              echo "Installed: $(pm2 -v)"
            fi

            echo "========== 4. serve (global) =========="
            if command -v serve &> /dev/null; then
              echo "serve already installed: $(serve -v)"
            else
              echo "Installing serve..."
              sudo npm install -g serve
              echo "Installed: $(serve -v)"
            fi

            echo "========== 5. Nginx =========="
            if command -v nginx &> /dev/null; then
              echo "Nginx already installed: $(nginx -v 2>&1)"
            else
              echo "Installing Nginx..."
              sudo yum install -y nginx
              sudo systemctl enable --now nginx
              echo "Installed: $(nginx -v 2>&1)"
            fi

            echo "========== 6. Certbot + Nginx plugin =========="
            if command -v certbot &> /dev/null; then
              echo "Certbot already installed: $(certbot --version 2>&1)"
            else
              echo "Installing Certbot..."
              sudo yum install -y certbot python3-certbot-nginx
              echo "Installed: $(certbot --version 2>&1)"
            fi

            echo "========== 7. Git =========="
            echo "Git: $(git --version)"

            echo "========== 8. Clone repo =========="
            if [ -d ~/daily-calculation ]; then
              echo "Repo already cloned at ~/daily-calculation"
            else
              echo "Cloning repository..."
              cd ~
              git clone https://github.com/anamika-nandi/daily-calculation.git
              echo "Cloned successfully"
            fi

            echo "========== 9. PM2 startup =========="
            sudo env PATH=$PATH:$(which node | xargs dirname) $(which pm2) startup systemd -u $USER --hp $HOME
            pm2 save

            echo "========== 10. Versions Summary =========="
            echo "Node.js: $(node -v)"
            echo "npm:     $(npm -v)"
            echo "PM2:     $(pm2 -v)"
            echo "serve:   $(serve -v)"
            echo "Nginx:   $(nginx -v 2>&1)"
            echo "Certbot: $(certbot --version 2>&1)"
            echo "Git:     $(git --version)"
            echo "========== Setup Complete =========="
